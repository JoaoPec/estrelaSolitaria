<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Produto — Mercado</title>
  <link rel="stylesheet" href="../assets/cliente.css" />
</head>
<body class="c-body">
  <div class="c-stage">
    <div class="c-phone">
      <div class="c-phone-notch" aria-hidden="true"></div>
      <div class="c-phone-inner">
        <header class="c-top c-top--plain">
          <a class="c-back" href="./catalogo.html" aria-label="Voltar">‹</a>
          <div class="c-top-title">
            <h1>Detalhe do produto</h1>
            <p>Mercearia</p>
          </div>
        </header>

        <main class="c-main" style="padding-bottom:2rem">
          <div class="c-card">
            <div class="c-hero">
              <div class="c-thumb" aria-hidden="true">🥛</div>
              <div>
                <h2 class="c-h2" style="font-size:1.15rem">Leite integral 1 L</h2>
                <p class="c-lead" style="margin:0.25rem 0 0;font-size:0.88rem">Código de barras: 7890 0000 0000</p>
                <div style="display:flex;align-items:center;gap:0.5rem;margin-top:0.75rem;flex-wrap:wrap">
                  <span class="c-price" style="font-size:1.35rem">R$ 4,99</span>
                  <span class="c-badge c-badge--warn">Pouco no estoque</span>
                </div>
                <p class="c-product-sub" style="margin-top:0.5rem">Validade: 25/04/2026</p>
              </div>
            </div>
            <p class="c-label" style="margin-top:1rem">Quantidade</p>
            <div class="c-qty">
              <button type="button" aria-label="Menos">−</button>
              <input type="number" value="1" min="1" aria-label="Quantidade" />
              <button type="button" aria-label="Mais">+</button>
            </div>
            <p class="c-lead" style="margin:0;font-size:0.88rem">Disponível: <strong>8 unidades</strong></p>
            <div class="c-row">
              <a class="c-btn c-btn-primary c-btn-block" href="./carrinho.html">Colocar no carrinho</a>
            </div>
          </div>

          <div class="c-card">
            <h2 class="c-h2" style="font-size:1rem">Sobre o produto</h2>
            <p class="c-lead" style="margin:0">Aqui entram informações simples: marca, fornecedor e dicas de conservação.</p>
          </div>
        </main>
      </div>
    </div>
  </div>
</body>
</html>
