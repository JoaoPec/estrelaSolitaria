<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Carrinho — Mercado</title>
  <link rel="stylesheet" href="../assets/cliente.css" />
</head>
<body class="c-body">
  <p class="c-hint">Prévia de como fica no celular no mercado ou no condomínio.</p>
  <div class="c-stage">
    <div class="c-phone">
      <div class="c-phone-notch" aria-hidden="true"></div>
      <div class="c-phone-inner">
        <header class="c-top c-top--plain">
          <a class="c-back" href="./catalogo.html" aria-label="Voltar">‹</a>
          <div class="c-top-title">
            <h1>Seu carrinho</h1>
            <p>Confira antes de pagar</p>
          </div>
          <a class="c-top-link" href="./catalogo.html">+ Itens</a>
        </header>

        <main class="c-main">
          <div class="c-card">
            <div class="c-cart-item">
              <div class="c-thumb" style="width:44px;height:44px;font-size:1.25rem" aria-hidden="true">🥛</div>
              <div class="c-product-mid">
                <div class="c-product-name">Leite integral 1 L</div>
                <div class="c-product-sub">Validade: 25/04/2026</div>
                <div class="c-qty" style="margin:0.5rem 0 0">
                  <button type="button">−</button>
                  <input type="number" value="1" min="1" />
                  <button type="button">+</button>
                </div>
              </div>
              <div class="c-cart-right">
                <strong class="c-price">R$ 4,99</strong>
                <button type="button" class="c-link">Remover</button>
              </div>
            </div>
            <div class="c-cart-item">
              <div class="c-thumb" style="width:44px;height:44px;font-size:1.25rem;background:linear-gradient(135deg,#ffe066,#ffd43b)" aria-hidden="true">🍚</div>
              <div class="c-product-mid">
                <div class="c-product-name">Arroz tipo 1 — 1 kg</div>
                <div class="c-product-sub">Validade: 10/09/2027</div>
                <div class="c-qty" style="margin:0.5rem 0 0">
                  <button type="button">−</button>
                  <input type="number" value="1" min="1" />
                  <button type="button">+</button>
                </div>
              </div>
              <div class="c-cart-right">
                <strong class="c-price">R$ 6,49</strong>
                <button type="button" class="c-link">Remover</button>
              </div>
            </div>
          </div>

          <div class="c-card c-card--accent">
            <div class="c-summary-row"><span>Subtotal</span><strong>R$ 11,48</strong></div>
            <div class="c-summary-row"><span>Taxas</span><strong>R$ 0,00</strong></div>
            <hr style="border:none;border-top:2px dashed var(--c-line);margin:0.75rem 0" />
            <div class="c-summary-row" style="font-size:1.15rem"><span>Total</span><strong>R$ 11,48</strong></div>
            <div class="c-row" style="margin-top:1rem">
              <a class="c-btn c-btn-mint c-btn-block" href="./pagamento.html">Ir para o pagamento</a>
            </div>
          </div>
        </main>

        <nav class="c-tabbar" aria-label="Menu inferior">
          <a class="c-tab" href="./bem-vindo.html"><span>⌂</span>Início</a>
          <a class="c-tab" href="./catalogo.html"><span>🛍️</span>Loja</a>
          <a class="c-tab c-tab--on" href="./carrinho.html"><span>🧺</span>Carrinho</a>
        </nav>
      </div>
    </div>
  </div>
</body>
</html>
