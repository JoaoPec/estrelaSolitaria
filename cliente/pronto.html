<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Pronto! — Mercado</title>
  <link rel="stylesheet" href="../assets/cliente.css" />
</head>
<body class="c-body">
  <div class="c-stage">
    <div class="c-phone">
      <div class="c-phone-notch" aria-hidden="true"></div>
      <div class="c-phone-inner">
        <header class="c-top">
          <div class="c-top-title">
            <h1>Tudo certo!</h1>
            <p>Obrigado pela compra</p>
          </div>
        </header>

        <main class="c-main" style="padding-bottom:2rem">
          <div class="c-card">
            <div class="c-success">
              <div class="c-success-icon" aria-hidden="true">✓</div>
              <h2 class="c-h2">Compra confirmada</h2>
              <p class="c-lead">Guarde o número do pedido para retirar ou conferir na loja.</p>
            </div>
            <div class="c-summary">
              <div class="c-summary-row"><span>Pedido</span><strong>#P-10293</strong></div>
              <div class="c-summary-row"><span>Total pago</span><strong>R$ 11,48</strong></div>
              <div class="c-summary-row"><span>Retirada</span><strong>Pronto em poucos minutos</strong></div>
            </div>
            <div class="c-row">
              <a class="c-btn c-btn-primary c-btn-block" href="./catalogo.html">Comprar de novo</a>
              <a class="c-btn c-btn-block" href="./bem-vindo.html">Voltar ao início</a>
            </div>
          </div>
          <p style="text-align:center;margin:0;font-size:0.82rem;color:var(--c-muted)">
            <a href="../index.html" style="color:var(--c-mint);font-weight:800">Página inicial</a>
          </p>
        </main>
      </div>
    </div>
  </div>
</body>
</html>
