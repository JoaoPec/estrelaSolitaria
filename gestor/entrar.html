<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Entrar — Área da loja</title>
  <link rel="stylesheet" href="../assets/gestor.css" />
</head>
<body class="g-body">
  <div class="g-login-wrap">
    <div class="g-login-card">
      <h1>Área da loja</h1>
      <p>Para <strong>gestores</strong> e <strong>administradores</strong></p>

      <div class="g-field">
        <label for="u">E-mail ou usuário</label>
        <input id="u" type="text" placeholder="seu.nome@loja.com.br" />
      </div>
      <div class="g-field">
        <label for="p">Senha</label>
        <input id="p" type="password" placeholder="Sua senha" />
      </div>
      <div class="g-field">
        <label for="loja">Loja</label>
        <select id="loja">
          <option>Condomínio Pituaçu — Loja 1</option>
          <option>Condomínio Costa Azul — Loja 2</option>
        </select>
      </div>

      <a class="g-btn g-btn-primary" href="./painel.html">Entrar no painel</a>
      <button type="button" class="g-btn g-btn-ghost">Esqueci a senha</button>

      <p class="g-back-home"><a href="../index.html">← Voltar</a></p>
    </div>
  </div>
</body>
</html>
